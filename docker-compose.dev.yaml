volumes:
  node_modules:

services:
  frontend:
    build:
      dockerfile: ./Dockerfile.dev
      # Forwarded from the dev script via UID=$(id -u) GID=$(id -g) so the
      # image is built with a user matching the developer running the stack.
      args:
        UID: '${UID:-1000}'
        GID: '${GID:-1000}'
    # Runtime guard: ensures the process user matches the host even if the
    # image was built by a different developer.
    user: '${UID:-1000}:${GID:-1000}'
    volumes:
      - .:/src
      - node_modules:/src/node_modules

  caddy:
    image: caddy:2-alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./.certs:/certs:ro
    depends_on:
      - frontend
    restart: unless-stopped
